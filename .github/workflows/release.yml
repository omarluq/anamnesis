name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # anamnesis links libsystemd's sdjournal via cgo; without these the
      # GoReleaser build (CGO_ENABLED=1, linux only) fails to compile/link.
      - name: Install libsystemd
        run: sudo apt-get update && sudo apt-get install -y libsystemd-dev pkg-config

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          CGO_ENABLED: "1"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
