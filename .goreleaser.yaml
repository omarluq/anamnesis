# yaml-language-server: $schema=https://goreleaser.com/static/schema.json

version: 2

project_name: ana

before:
  hooks:
    - go mod tidy

builds:
  - id: ana
    main: ./cmd/ana
    binary: ana
    # anamnesis reads the systemd journal through libsystemd's sdjournal (cgo)
    # and is Linux-only by construction: internal/ana/journal/sdjournal.go is
    # //go:build linux and internal/di/hostsurfaces.go calls journal.NewClient
    # unconditionally, so the binary does not compile for darwin/windows. Build
    # only linux/amd64 with cgo, matching the CI build job (ana-linux-amd64).
    env:
      - CGO_ENABLED=1
    goos:
      - linux
    goarch:
      - amd64
    ldflags:
      - -s -w
      - -X github.com/omarluq/anamnesis/internal/vinfo.version={{.Version}}|{{.Commit}}|{{.Date}}

archives:
  - id: default
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - config.example.yaml

checksum:
  name_template: checksums.txt
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - Merge pull request
      - Merge branch
  groups:
    - title: New Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: Performance Improvements
      regexp: '^.*?perf(\([[:word:]]+\))??!?:.+$'
      order: 2
    - title: Other Changes
      order: 999

release:
  draft: false
  prerelease: auto
  mode: replace
  header: |
    ## {{ .ProjectName }} {{ .Version }}

    CLI release generated by GoReleaser.
